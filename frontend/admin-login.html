<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/theme.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body.theme-dark,
    body:not(.theme-light) {
      background: #1f242d;
      background-image: url('/images/swe.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-blend-mode: overlay;
    }
    body.theme-light {
      background-image: none !important;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .login-card {
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.9);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    .theme-dark .login-card {
      background: rgba(15, 20, 30, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>
  <div class="w-full max-w-md px-4">
    <div class="login-card p-8">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-2">Admin Login</h1>
        <p class="text-gray-600 dark:text-gray-400">Enter your credentials to access the admin panel</p>
      </div>
      
      <form id="login-form" class="space-y-6">
        <div>
          <label class="block text-gray-700 dark:text-gray-300 mb-2 font-medium">
            <i class="fas fa-user text-blue-600 mr-2"></i>Username
          </label>
          <input type="text" id="username" required 
                 class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600 dark:bg-gray-700 dark:text-white"
                 placeholder="Enter your username">
        </div>
        
        <div>
          <label class="block text-gray-700 dark:text-gray-300 mb-2 font-medium">
            <i class="fas fa-lock text-blue-600 mr-2"></i>Password
          </label>
          <input type="password" id="password" required 
                 class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600 dark:bg-gray-700 dark:text-white"
                 placeholder="Enter your password">
        </div>
        
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-semibold transition duration-200 transform hover:scale-105">
          <i class="fas fa-sign-in-alt mr-2"></i>Login
        </button>
      </form>
      
      <div id="message" class="mt-4 text-center"></div>
      
      <div class="mt-6 text-center">
        <a href="/" class="text-blue-600 hover:text-blue-800 dark:text-blue-400 hover:underline">
          <i class="fas fa-home mr-1"></i>Back to Home
        </a>
      </div>
    </div>
    
    <div class="text-center mt-4 text-white">
      <!-- <p>Default: admin / Admin123!</p> -->
    </div>
  </div>

  <script src="/js/theme.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initializeTheme();
      
      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const submitBtn = e.target.querySelector('button[type="submit"]');
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Logging in...';
        submitBtn.disabled = true;
        
        try {
          const response = await fetch('/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              username: document.getElementById('username').value,
              password: document.getElementById('password').value
            })
          });
          
          const data = await response.json();
          
          if (response.ok) {
            window.location.href = '/admin.html';
          } else {
            document.getElementById('message').innerHTML = 
              `<p class="text-red-600 dark:text-red-400"><i class="fas fa-exclamation-circle mr-2"></i>${data.error}</p>`;
          }
        } catch (error) {
          document.getElementById('message').innerHTML = 
            `<p class="text-red-600 dark:text-red-400"><i class="fas fa-exclamation-circle mr-2"></i>Connection error</p>`;
        } finally {
          submitBtn.innerHTML = originalText;
          submitBtn.disabled = false;
        }
      });
    });
  </script>
</body>
</html>

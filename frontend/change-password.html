<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password - Portfolio Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/theme.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    body.theme-dark,
    body:not(.theme-light) {
      background: #0f1419;
      background-image: url('/images/swe.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-blend-mode: overlay;
    }
    body.theme-light {
      background-image: none !important;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .password-card {
      backdrop-filter: blur(20px);
      background: rgba(255, 255, 255, 0.98);
      border-radius: 24px;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.25);
      width: 100%;
      max-width: 480px;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .theme-dark .password-card {
      background: rgba(20, 25, 35, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
    }
    .input-group {
      position: relative;
      margin-bottom: 1.5rem;
    }
    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #6366f1;
      font-size: 18px;
      z-index: 10;
    }
    .theme-dark .input-icon {
      color: #818cf8;
    }
    .password-input {
      width: 100%;
      padding: 14px 16px 14px 48px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      font-size: 15px;
      transition: all 0.3s ease;
      background: #ffffff;
      color: #1f2937;
    }
    .password-input:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }
    .theme-dark .password-input {
      background: rgba(30, 35, 45, 0.6);
      border-color: rgba(255, 255, 255, 0.1);
      color: #ffffff;
    }
    .theme-dark .password-input:focus {
      border-color: #818cf8;
      box-shadow: 0 0 0 4px rgba(129, 140, 248, 0.15);
    }
    .password-input::placeholder {
      color: #9ca3af;
    }
    .theme-dark .password-input::placeholder {
      color: #6b7280;
    }
    .submit-btn {
      width: 100%;
      padding: 14px 24px;
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
    }
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
    }
    .submit-btn:active {
      transform: translateY(0);
    }
    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .label-text {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
      letter-spacing: 0.01em;
    }
    .theme-dark .label-text {
      color: #e5e7eb;
    }
    .helper-text {
      font-size: 13px;
      color: #6b7280;
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .theme-dark .helper-text {
      color: #9ca3af;
    }
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, #e5e7eb, transparent);
      margin: 24px 0;
    }
    .theme-dark .divider {
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
    }
    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #6366f1;
      text-decoration: none;
      transition: all 0.2s ease;
      padding: 8px 12px;
      border-radius: 8px;
    }
    .nav-link:hover {
      background: rgba(99, 102, 241, 0.1);
      color: #4f46e5;
    }
    .theme-dark .nav-link {
      color: #818cf8;
    }
    .theme-dark .nav-link:hover {
      background: rgba(129, 140, 248, 0.15);
      color: #a5b4fc;
    }
    .header-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
    }
    .header-icon i {
      font-size: 28px;
      color: white;
    }
    .strength-indicator {
      height: 4px;
      background: #e5e7eb;
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }
    .strength-bar {
      height: 100%;
      transition: all 0.3s ease;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="password-card">
    <div class="p-8">
      <div class="text-center mb-8">
        <div class="header-icon">
          <i class="fas fa-shield-alt"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">Change Password</h1>
        <p class="text-sm text-gray-600 dark:text-gray-400">Update your admin account password</p>
      </div>

      <form id="password-form">
        <div class="input-group">
          <label class="label-text">Current Password</label>
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="current-password" required 
                 class="password-input"
                 placeholder="Enter your current password">
        </div>

        <div class="input-group">
          <label class="label-text">New Password</label>
          <i class="fas fa-key input-icon"></i>
          <input type="password" id="new-password" required minlength="8"
                 class="password-input"
                 placeholder="Enter new password (min. 8 characters)">
          <div class="strength-indicator">
            <div id="strength-bar" class="strength-bar" style="width: 0%; background: #e5e7eb;"></div>
          </div>
          <p class="helper-text">
            <i class="fas fa-info-circle"></i>
            <span>Use a strong password with letters, numbers, and symbols</span>
          </p>
        </div>

        <div class="input-group">
          <label class="label-text">Confirm New Password</label>
          <i class="fas fa-check-circle input-icon"></i>
          <input type="password" id="confirm-password" required minlength="8"
                 class="password-input"
                 placeholder="Re-enter your new password">
        </div>

        <div id="password-match" class="text-sm font-medium mb-4 hidden"></div>

        <button type="submit" class="submit-btn">
          <i class="fas fa-save mr-2"></i>Update Password
        </button>
      </form>

      <div id="message" class="mt-4"></div>

      <div class="divider"></div>

      <div class="flex justify-between items-center">
        <a href="/admin.html" class="nav-link">
          <i class="fas fa-arrow-left"></i>
          <span>Back to Admin</span>
        </a>
        <a href="/admin-login.html" class="nav-link">
          <i class="fas fa-sign-out-alt"></i>
          <span>Logout</span>
        </a>
      </div>
    </div>
  </div>

  <script>
    // Password strength checker
    function checkPasswordStrength(password) {
      let strength = 0;
      const strengthBar = document.getElementById('strength-bar');
      
      if (password.length >= 8) strength += 25;
      if (password.length >= 12) strength += 25;
      if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength += 25;
      if (/\d/.test(password)) strength += 15;
      if (/[^a-zA-Z0-9]/.test(password)) strength += 10;
      
      let color = '#ef4444';
      if (strength >= 75) color = '#22c55e';
      else if (strength >= 50) color = '#eab308';
      else if (strength >= 25) color = '#f97316';
      
      strengthBar.style.width = strength + '%';
      strengthBar.style.background = color;
    }

    document.getElementById('new-password').addEventListener('input', function() {
      checkPasswordStrength(this.value);
    });

    // Real-time password match check
    document.getElementById('confirm-password').addEventListener('input', function() {
      const newPass = document.getElementById('new-password').value;
      const confirmPass = this.value;
      const matchDiv = document.getElementById('password-match');

      if (confirmPass.length > 0) {
        matchDiv.classList.remove('hidden');
        if (newPass === confirmPass) {
          matchDiv.className = 'text-sm font-medium mb-4 text-green-600 dark:text-green-400 flex items-center gap-2';
          matchDiv.innerHTML = '<i class="fas fa-check-circle"></i><span>Passwords match</span>';
        } else {
          matchDiv.className = 'text-sm font-medium mb-4 text-red-600 dark:text-red-400 flex items-center gap-2';
          matchDiv.innerHTML = '<i class="fas fa-times-circle"></i><span>Passwords do not match</span>';
        }
      } else {
        matchDiv.classList.add('hidden');
      }
    });

    // Form submission
    document.getElementById('password-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const currentPassword = document.getElementById('current-password').value;
      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const matchDiv = document.getElementById('password-match');

      if (newPassword !== confirmPassword) {
        matchDiv.className = 'text-sm font-medium mb-4 text-red-600 dark:text-red-400 flex items-center gap-2';
        matchDiv.innerHTML = '<i class="fas fa-times-circle"></i><span>Passwords do not match</span>';
        matchDiv.classList.remove('hidden');
        return;
      }

      if (newPassword.length < 8) {
        matchDiv.className = 'text-sm font-medium mb-4 text-red-600 dark:text-red-400 flex items-center gap-2';
        matchDiv.innerHTML = '<i class="fas fa-times-circle"></i><span>Password must be at least 8 characters</span>';
        matchDiv.classList.remove('hidden');
        return;
      }

      const submitBtn = e.target.querySelector('button[type="submit"]');
      const originalText = submitBtn.innerHTML;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Updating Password...';
      submitBtn.disabled = true;

      try {
        const response = await fetch('/api/admin/change-password', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ currentPassword, newPassword })
        });

        const data = await response.json();

        if (response.ok) {
          document.getElementById('message').innerHTML = 
            `<div class="bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 rounded-lg p-4 flex items-start gap-3">
              <i class="fas fa-check-circle text-green-600 dark:text-green-400 text-xl mt-0.5"></i>
              <div>
                <p class="font-semibold text-green-900 dark:text-green-100">Password Updated Successfully!</p>
                <p class="text-sm text-green-700 dark:text-green-300 mt-1">Redirecting to login page...</p>
              </div>
            </div>`;
          
          document.getElementById('password-form').reset();
          document.getElementById('strength-bar').style.width = '0%';

          setTimeout(() => {
            window.location.href = '/admin-login.html';
          }, 2500);
        } else {
          document.getElementById('message').innerHTML = 
            `<div class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg p-4 flex items-start gap-3">
              <i class="fas fa-exclamation-circle text-red-600 dark:text-red-400 text-xl mt-0.5"></i>
              <div>
                <p class="font-semibold text-red-900 dark:text-red-100">Update Failed</p>
                <p class="text-sm text-red-700 dark:text-red-300 mt-1">${data.error}</p>
              </div>
            </div>`;
        }
      } catch (error) {
        document.getElementById('message').innerHTML = 
          `<div class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg p-4 flex items-start gap-3">
            <i class="fas fa-exclamation-triangle text-red-600 dark:text-red-400 text-xl mt-0.5"></i>
            <div>
              <p class="font-semibold text-red-900 dark:text-red-100">Connection Error</p>
              <p class="text-sm text-red-700 dark:text-red-300 mt-1">Unable to connect to server. Please try again.</p>
            </div>
          </div>`;
      } finally {
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
